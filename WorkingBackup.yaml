esphome:
  name: home-assistant-voice-852d00
  friendly_name: "ESP32-S3 Audio Player"
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret esphome_api_password

logger:
  level: DEBUG

i2c:
  id: esphome_i2c
  sda: GPIO11
  scl: GPIO10
  scan: false

tca9555:
  - id: io_expander
    i2c_id: esphome_i2c
    address: 0x20

switch:
  - platform: gpio
    name: "Speaker Amplifier"
    id: speaker_amp_switch
    pin:
      tca9555: io_expander
      number: 8
    restore_mode: RESTORE_DEFAULT_ON

audio:
  codecs:
    mp3:
    wav:
    opus:
      state_memory: psram
      pseudostack:
        threadsafe: false
        buffer_memory: internal
        size: 80000

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: esphome_i2c
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    use_mclk: true

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO14
    i2s_bclk_pin: GPIO13
    i2s_mclk_pin: GPIO12

speaker:
  - platform: i2s_audio
    id: audio_speaker
    dac_type: external
    i2s_dout_pin: GPIO16
    i2s_audio_id: i2s_output
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    audio_dac: es8311_dac

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

media_source:
  - platform: sendspin
    id: sendspin_media_source
    decode_memory: internal

media_player:
  - platform: speaker_source
    id: external_media_player
    name: Media Player
    media_pipeline:
      speaker: audio_speaker
      sources:
        - sendspin_media_source